<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | TDS Innovation Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Checkout Section -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-4xl font-bold text-gray-900 mb-8">Checkout</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Checkout Form -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-md p-8 mb-6">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">Shipping Information</h2>
                    <form id="checkout-form">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div>
                                <label class="block text-gray-700 font-medium mb-2">First Name *</label>
                                <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                            </div>
                            <div>
                                <label class="block text-gray-700 font-medium mb-2">Last Name *</label>
                                <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-gray-700 font-medium mb-2">Email Address *</label>
                            <input type="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-gray-700 font-medium mb-2">Phone Number *</label>
                            <input type="tel" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-gray-700 font-medium mb-2">Street Address *</label>
                            <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                            <div>
                                <label class="block text-gray-700 font-medium mb-2">City *</label>
                                <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                            </div>
                            <div>
                                <label class="block text-gray-700 font-medium mb-2">State *</label>
                                <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                            </div>
                            <div>
                                <label class="block text-gray-700 font-medium mb-2">PIN Code *</label>
                                <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-gray-700 font-medium mb-2">Order Notes (Optional)</label>
                            <textarea rows="4" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="Any special instructions?"></textarea>
                        </div>
                    </form>
                </div>
                
                <div class="bg-white rounded-xl shadow-md p-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">Payment Method</h2>
                    
                    <div class="space-y-4">
                        <label class="flex items-center p-4 border-2 border-purple-600 rounded-lg cursor-pointer">
                            <input type="radio" name="payment" value="cod" checked class="mr-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-2">
                                    <i data-lucide="banknote" class="w-5 h-5 text-purple-600"></i>
                                    <span class="font-semibold text-gray-900">Cash on Delivery</span>
                                </div>
                                <p class="text-sm text-gray-600 mt-1">Pay when you receive your order</p>
                            </div>
                        </label>
                        
                        <label class="flex items-center p-4 border-2 border-gray-200 rounded-lg cursor-pointer hover:border-purple-600">
                            <input type="radio" name="payment" value="upi" class="mr-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-2">
                                    <i data-lucide="smartphone" class="w-5 h-5 text-gray-600"></i>
                                    <span class="font-semibold text-gray-900">UPI Payment</span>
                                </div>
                                <p class="text-sm text-gray-600 mt-1">Google Pay, PhonePe, Paytm</p>
                            </div>
                        </label>
                        
                        <label class="flex items-center p-4 border-2 border-gray-200 rounded-lg cursor-pointer hover:border-purple-600">
                            <input type="radio" name="payment" value="card" class="mr-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-2">
                                    <i data-lucide="credit-card" class="w-5 h-5 text-gray-600"></i>
                                    <span class="font-semibold text-gray-900">Credit/Debit Card</span>
                                </div>
                                <p class="text-sm text-gray-600 mt-1">Visa, Mastercard, Rupay</p>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Order Summary -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-md p-8 sticky top-4">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">Order Summary</h2>
                    
                    <div id="order-summary-items" class="space-y-4 mb-6">
                        <!-- Order summary items will be injected here -->
                    </div>
                    
                    <div class="space-y-3 mb-6">
                        <div class="flex justify-between text-gray-600">
                            <span>Subtotal</span>
                            <span id="order-subtotal">₹0</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Shipping</span>
                            <span id="order-shipping" class="text-green-600 font-semibold">FREE</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Tax (GST 18%)</span>
                            <span id="order-tax">₹0</span>
                        </div>
                        <div class="border-t pt-3 flex justify-between items-center">
                            <span class="text-xl font-bold text-gray-900">Total</span>
                            <span id="order-total" class="text-2xl font-bold text-purple-600">₹0</span>
                        </div>
                    </div>
                    
                    <button onclick="placeOrder()" class="w-full bg-purple-600 text-white py-4 rounded-lg hover:bg-purple-700 transition font-semibold text-lg flex items-center justify-center gap-2">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                        Place Order
                    </button>
                    
                    <div class="mt-6 flex items-center justify-center gap-4 text-gray-500 text-sm">
                        <div class="flex items-center gap-1">
                            <i data-lucide="shield-check" class="w-4 h-4"></i>
                            <span>Secure Checkout</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="products.js"></script>
    <script src="layout.js"></script>
    <script src="cart.js"></script>
    <script>
        function populateOrderSummary() {
            const orderSummaryItems = document.getElementById('order-summary-items');
            const orderSubtotal = document.getElementById('order-subtotal');
            const orderTax = document.getElementById('order-tax');
            const orderTotal = document.getElementById('order-total');

            let cart = JSON.parse(localStorage.getItem('cart')) || [];

            if (cart.length === 0) {
                orderSummaryItems.innerHTML = '<p class="text-gray-500 text-center">Your cart is empty</p>';
                return;
            }

            let subtotal = 0;
            orderSummaryItems.innerHTML = cart.map(item => {
                subtotal += item.price * item.quantity;
                return `
                    <div class="flex items-center gap-4 pb-4 border-b">
                        <img src="${item.image}" alt="${item.name}" class="w-16 h-16 rounded-lg object-cover">
                        <div class="flex-1">
                            <h4 class="font-semibold text-gray-900">${item.name}</h4>
                            <p class="text-sm text-gray-600">Qty: ${item.quantity}</p>
                        </div>
                        <span class="font-bold text-gray-900">₹${(item.price * item.quantity).toLocaleString()}</span>
                    </div>
                `;
            }).join('');

            const tax = subtotal * 0.18;
            const total = subtotal + tax;

            orderSubtotal.textContent = '₹' + subtotal.toLocaleString();
            orderTax.textContent = '₹' + tax.toLocaleString();
            orderTotal.textContent = '₹' + total.toLocaleString();
        }

        function placeOrder() {
            const form = document.getElementById('checkout-form');
            if (form.checkValidity()) {
                alert('Thank you for your order! Your order has been placed successfully.\\n\\nOrder ID: #TDS' + Math.floor(Math.random() * 100000) + '\\n\\nYou will receive a confirmation email shortly.');
                localStorage.removeItem('cart');
                window.location.href = 'index.html';
            } else {
                form.reportValidity();
            }
        }
        
        // Radio button styling
        document.querySelectorAll('input[name="payment"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('input[name="payment"]').forEach(r => {
                    r.parentElement.classList.remove('border-purple-600');
                    r.parentElement.classList.add('border-gray-200');
                });
                this.parentElement.classList.add('border-purple-600');
                this.parentElement.classList.remove('border-gray-200');
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            populateOrderSummary();
            lucide.createIcons();
        });
    </script>
</body>
</html>
